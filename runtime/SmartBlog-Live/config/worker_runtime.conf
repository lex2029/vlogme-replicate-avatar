# ------------------------------------------------------------------------------
# Working (tunable) parameters.
# Change here for experiments/operations.
# ------------------------------------------------------------------------------

# Process/runtime.
# GPU IDs visible to the worker process.
CUDA_VISIBLE_DEVICES=0,1
# Number of torchrun processes (one per GPU).
TORCHRUN_NPROC=2
# Ulysses tensor-parallel factor.
ULYSSES_SIZE=1
# Number of GPUs allocated to DiT/model side.
NUM_GPUS_DIT=2
# torch.distributed master port for local rendezvous.
MASTER_PORT=29515
# Stable split-server baseline keeps torch.compile off. Compile experiments must
# use a dedicated branch/profile; do not silently override this from role files.
ENABLE_COMPILE=false
# torch.compile runtime policy. Keep these tunable here so A/B tests can change
# acceleration behavior without touching the locked generation contract.
TORCH_COMPILE_DYNAMIC=0
TORCH_COMPILE_MODE=
TORCHDYNAMO_CAPTURE_SCALAR_OUTPUTS=1
# Compile only explicitly selected regions. Full `_forward_inference` still hits
# a PyTorch/Inductor generated-kernel NameError on this stack (missing buf vars),
# so this branch tests regional compile without risking service crashes.
TORCH_COMPILE_SAFE_FALLBACK=1
TORCH_COMPILE_INCLUDE_FUNCS=CausalHead_S2V.forward
TORCH_COMPILE_SKIP_FUNCS=_forward_inference,rope_apply,rope_apply_cond
TORCHINDUCTOR_CUDAGRAPHS=0
TORCHINDUCTOR_TRITON_CUDAGRAPH_TREES=0
TORCHINDUCTOR_FX_GRAPH_CACHE=1
TORCHINDUCTOR_MAX_AUTOTUNE=0
TORCHINDUCTOR_MAX_AUTOTUNE_GEMM=0
TORCHINDUCTOR_MAX_AUTOTUNE_POINTWISE=0
TORCHINDUCTOR_COORDINATE_DESCENT_TUNING=0
TORCHINDUCTOR_TRITON_AUTOTUNE_AT_COMPILE_TIME=0
TORCHINDUCTOR_COMPILE_THREADS=8
# Enables/disables FP8 path (if supported by stack).
USE_FP8=0
# Optional distributed extras.
ENABLE_T5_FSDP=0
ENABLE_DIT_FSDP=0
ENABLE_VAE_PARALLEL=0
OFFLOAD_KV_CACHE=0
# Attention backend policy for Wan path.
LIVEAVATAR_DISABLE_FLASH_ATTN=true
# Generation-only A/B on RTX PRO 6000 Blackwell showed PyTorch SDPA is a few
# percent faster than forcing the explicit cuDNN SDPA op for our Wan S2V shapes.
LIVEAVATAR_DISABLE_CUDNN_ATTN=true
WORKER_COMMENT_QUEUE_MAX=64
WORKER_HARD_MODERATE_LIVE_COMMENTS=1
WORKER_STRICT_MODERATE_LIVE_COMMENTS=1
WORKER_LIVE_COMMENT_MAX_CHARS=420
WORKER_SPEAK_LIVE_COMMENT_TEXT=1
WORKER_SPEAK_RAW_LIVE_COMMENT_TEXT=0
WORKER_TOPIC_CONTEXT_ENABLE=1
WORKER_TOPIC_CONTEXT_TURNS=3
WORKER_TOPIC_CONTEXT_QUESTION_CHARS=240
WORKER_TOPIC_CONTEXT_ANSWER_CHARS=700
WORKER_SESSION_HEALTH_GRACE_SEC=45
# Worker API and room mode.
# This deployment is SmartBlog-only. Legacy fallback paths stay in code for old
# workers, but the production config must not run both claimers.
WORKER_CONTROL_PLANE=smartblog
# Legacy API base URL for the inactive fallback task claim flow.
AVALIFE_BASE_URL=https://api.avalife.ai/v1
# Supabase project URL for realtime task channel.
AVALIFE_SUPABASE_URL=https://flfllzcqglnqefgqltqf.supabase.co
# Optional local mock claim file for conduct_live_session dry-runs.
SMARTBLOG_MOCK_CLAIM_FILE=
SMARTBLOG_MOCK_STATE_DIR=
# SmartBlog supported job types for live-capable producer sets. File renders are
# isolated to the dedicated render-only worker via `SMARTBLOG_JOB_TYPES=render_video`.
SMARTBLOG_JOB_TYPES=conduct_live_session,conduct_consultation
SMARTBLOG_PREEMPT_ENABLED=0
# Reconnect/backoff interval for SmartBlog realtime/bootstrap poll.
SMARTBLOG_POLL_SEC=5.0
# Optional delay after a SmartBlog poll finds claimable jobs, before attempting
# claim. Useful when a newly started worker should give another producer a short
# first chance to pick up the job.
SMARTBLOG_CLAIM_AFTER_POLL_DELAY_SEC=0.0
# Worker API progress is also the lease heartbeat. Keep it close to the docs
# recommendation so long live/webinar jobs are not reaped while streaming.
SMARTBLOG_PROGRESS_SEC=2.0
SMARTBLOG_UPLOAD_PROGRESS_SEC=30.0
SMARTBLOG_RENDER_FINALIZE_BACKGROUND=1
SMARTBLOG_LIVEKIT_EMPTY_RELEASE_SEC=120.0
SMARTBLOG_PROACTIVE_AFTER_SEC=120.0
SMARTBLOG_CHAT_STALE_SEC=90.0
SMARTBLOG_PROGRESS_STALE_SEC=120.0
# Keep Restream chat observability on even in release profile: these are sparse
# business events and are the only way to confirm viewer comments reached us.
SMARTBLOG_RESTREAM_CHAT_LOG=1
# Temporary webinar-style consultation profile for testing. Keep LiveKit
# transport, but disable interruption/preemption so long monologues can run.
SMARTBLOG_CONSULTATION_FORCE_INTERRUPTION=0
# Super rule: keep LiveKit consultations on the warmed realtime/live_raw path
# by default. Full buffered video+audio replies start far too late in practice,
# even when they look smoother in isolation. Only enable this for explicit
# experiments.
SMARTBLOG_LIVEKIT_BUFFERED_SEGMENT_MODE=0
# Companion flag for the experimental buffered mode above. Also keep this off
# by default for the same reason: it further increases first-response latency.
SMARTBLOG_LIVEKIT_SINGLESHOT_TTS=0
# YouTube/Castr RTMP encoder tuning. API publish contract is 30 CFR. Model
# generation stays on locked WORKER_FPS; ffmpeg duplicates frames to the RTMP clock.
# Live profiles already emit the final 720p social canvas (720x1280 or
# 1280x720). Keep RTMP on that exact canvas by default; YouTube vertical
# detection is more predictable when the encoder sends the final 9:16/16:9
# stream directly instead of a second upscaled canvas.
LIVE_CHANNEL_RTMP_OUTPUT_FPS=30
LIVE_CHANNEL_RTMP_KEYFRAME_SEC=2.0
LIVE_CHANNEL_RTMP_VIDEO_BITRATE=4500k
LIVE_CHANNEL_RTMP_VIDEO_MAXRATE=4500k
LIVE_CHANNEL_RTMP_VIDEO_BUFSIZE=9000k
LIVE_CHANNEL_RTMP_AUDIO_BITRATE=128k
# Live profiles emit a clean model canvas; RTMP may upscale it, but must never
# add a compatibility canvas or visual bars by default.
LIVE_CHANNEL_RTMP_STANDARD_PAD=0
LIVE_CHANNEL_RTMP_SOCIAL_UPSCALE=0
LIVE_CHANNEL_RTMP_SCALE_FLAGS=bicubic
# Task type/mode consumed from API.
AVATAR_MODE=2dlive_test

# Paths/model.
# Asset root may live outside the checked-out code directory.
# Keep it overridable from env so the same branch can run from another path
# without editing the config file.
WORKER_ASSET_ROOT="${WORKER_ASSET_ROOT:-$ROOT_DIR}"
# Worker task/model family.
WORKER_TASK=s2v-14B
# Training/inference config yaml.
TRAINING_CONFIG=liveavatar/configs/s2v_causal_sft.yaml
# Model checkpoint directory.
CKPT_DIR="${CKPT_DIR:-$WORKER_ASSET_ROOT/ckpt/Wan2.2-S2V-14B/}"
# LoRA file path (local, avoids network stall on startup).
LORA_PATH_DMD="${LORA_PATH_DMD:-$WORKER_ASSET_ROOT/ckpt/LiveAvatar/liveavatar.safetensors}"
# Optional pre-merged noise model path for faster cold starts.
MERGED_NOISE_MODEL_DIR="${MERGED_NOISE_MODEL_DIR:-$WORKER_ASSET_ROOT/ckpt/Wan2.2-S2V-14B-merged-liveavatar-prefp8-test}"
MERGED_CKPT_DIR=
USE_MERGED_CKPT=1
# Output directory for generated media/artifacts.
SAVE_DIR=./output/
# Local HTTP port for model service.
SERVER_PORT=7861
# Local HTTP bind host for model service.
SERVER_NAME=127.0.0.1
# Base reference image path for avatar.
WORKER_REF_IMAGE="${WORKER_REF_IMAGE:-$ROOT_DIR/assets/ref_user_photo.jpg}"
# Folder for per-room context logs/history.
WORKER_CONTEXT_DIR=./tmp/livekit_context
# Live channel name used by worker/media artifacts.
LIVE_CHANNEL_NAME=main

# LLM/TTS runtime.
# OpenAI chat model ID.
OPENAI_MODEL=gpt-4o-mini
# Optional startup reply warmup gate for clean-branch A/B tests.
WORKER_STARTUP_REPLY_WARMUP_ENABLED=1
# SmartBlog must run the liveaudio/model streaming warmup before it can claim
# live jobs. Without this, the first post-restart stream warms denoise/live_raw
# in public and can drain the edge video runway to zero.
WORKER_STARTUP_LIVEAUDIO_WARMUP_ENABLED=1
WORKER_STARTUP_LIVEAUDIO_WARMUP_PASSES=4
# Context window limits (per room). This is message-count based, not token-count based.
WORKER_CONTEXT_MAX_EVENTS=500
WORKER_CONTEXT_USER_MESSAGES=64
WORKER_CONTEXT_ASSISTANT_MESSAGES=96
# Historical host auto-prompts are repeated "continue talking" directives; keep
# them out of LLM memory so the assistant history drives continuity instead.
WORKER_CONTEXT_SKIP_HOST_AUTO_HISTORY=1
WORKER_CONTEXT_ANTI_REPEAT_ENABLE=1
WORKER_IDLE_PROMPT_SUFFIX="The person is completely silent with lips gently closed and relaxed. Keep the face neutral and calm. Almost no head motion, almost no body motion, no gestures, no mouth movement, no expressive emotion, no reactive motion, no nodding, no swaying. Eyes stay open and steady for long intervals. Blinking is exceptionally rare, isolated, and natural. Never blink rapidly or several times in a row. Keep the mouth closed and steady, with only tiny natural micro-motion and extremely subtle breathing."
# Max completion tokens for one assistant response.
OPENAI_MAX_TOKENS=4096
# Max completion tokens for the generated first webinar opener only.
SMARTBLOG_OPENING_MAX_TOKENS=4096
# Live semantic turn caps. Comments must stay compact, but keep enough headroom
# so a valid long answer can finish naturally instead of being cut mid-sentence.
SMARTBLOG_COMMENT_MAX_TOKENS=700
SMARTBLOG_CONTINUE_MAX_TOKENS=1200
SMARTBLOG_DURATION_FINAL_MAX_TOKENS=1600
# ElevenLabs TTS model. `eleven_v3` is not supported by ElevenLabs stream-input
# WebSockets, so the worker routes it through the HTTP stream speech endpoint.
WORKER_ELEVEN_WS_MODEL_ID=eleven_v3
# Eleven v3 HTTP TTS live segmentation. Group complete sentences until the
# segment has enough words; tiny sentence-per-request groups add HTTP latency
# to every sentence and starve the live video path.
WORKER_ELEVEN_V3_FIRST_SEGMENT_MIN_WORDS=30
WORKER_ELEVEN_V3_FIRST_SEGMENT_MAX_CHARS=900
WORKER_ELEVEN_V3_SEGMENT_MIN_WORDS=30
WORKER_ELEVEN_V3_SEGMENT_MAX_CHARS=900
WORKER_ELEVEN_V3_SEGMENT_TAIL_SILENCE_MS=650
WORKER_ELEVEN_V3_FINAL_TAIL_SILENCE_MS=900
# Keep Eleven v3 HTTP requests consistent across sentence-groups and turns.
# Eleven v3 rejects previous/next text and request-id stitching on the HTTP TTS
# endpoint, so voice continuity relies on deterministic seed plus voice settings.
WORKER_ELEVEN_V3_SEED=420
WORKER_ELEVEN_V3_CONTINUITY_PREVIOUS_CHARS=1200
WORKER_ELEVEN_V3_CONTINUITY_NEXT_CHARS=700
WORKER_ELEVEN_V3_REQUEST_STITCHING=0
WORKER_ELEVEN_V3_REQUEST_ID_WINDOW=3
WORKER_ELEVEN_V3_DEFAULT_STABILITY=0.85
WORKER_ELEVEN_V3_DEFAULT_SIMILARITY_BOOST=0.95
WORKER_ELEVEN_V3_DEFAULT_STYLE=0.0
WORKER_ELEVEN_V3_DEFAULT_USE_SPEAKER_BOOST=1
# Default ElevenLabs voice ID.
# Used only when claim payload omits `avatar_config.voice_id` entirely.
DEFAULT_ELEVEN_VOICE_ID=NEqPvTuKWuvwUMAEPBPR

# Liveaudio generation pacing.
# Produces TTS/audio chunks asynchronously to keep infer fed.
LIVE_AUDIO_STREAM_ASYNC_PRODUCER=1
# For reply streams, start async refill after the first denoise block. This
# keeps future audio encode from competing with the first-frame path.
LIVE_AUDIO_STREAM_ASYNC_START_AFTER_FIRST_CLIP=1
# Disables mid-denoise refill to avoid jitter inside a denoise block.
LIVE_AUDIO_STREAM_REFILL_DURING_DENOISE=0
# Caps pending liveaudio clips inside model feeder queue. A chunk is 3.2s in the
# locked 15fps/48-frame mode. Webinar/live RTMP needs a larger runway than
# interactive calls: if model/edge falls behind, a 4-block tail drains into
# visible no-video gap-fill.
LIVE_AUDIO_STREAM_MAX_PENDING_CLIPS=24
# Total clip budget for one liveaudio model request. Keep this separate from
# the pending queue cap: long RTMP sessions must stay bounded by cancel/done
# markers, not by a fixed hidden clip count. 0 uses the pipeline max_repeat
# safety ceiling; positive values are only for explicit stress tests.
LIVE_AUDIO_STREAM_MAX_TOTAL_CLIPS=0
WORKER_STREAM_NEXT_TURN_PREPARE_AHEAD_CHUNKS=12
WORKER_STREAM_COMMENT_PENDING_LEAD_CHUNKS=6
# 0 disables producer wallclock throttling for stream speech chunks. This cap
# blocked writes while the remote edge was already at pending_blocks=0/no_video.
WORKER_STREAM_WALLCLOCK_MAX_LEAD_SEC=0
# Fallback only if the API omits auto_messages.continue_cooldown_sec.
# Normal stream/webinar auto-continue pause comes from the persona claim.
WORKER_STREAM_CONTINUE_AFTER_SEC=0.00
# Stream turn-boundary pause is a real model input before selected slow semantic
# turns, not emergency RTMP gap-fill. It must not run before host_continue or
# comment turns: continuations should finish first, and comments should be read
# before any wait for a long answer.
WORKER_STREAM_TURN_BOUNDARY_PAUSE_MIN_SEC=0.25
WORKER_STREAM_TURN_BOUNDARY_PAUSE_MAX_SEC=2.0
WORKER_STREAM_TURN_BOUNDARY_PAUSE_MAX_CHUNKS=1
# Comments are selected as soon as their spoken lead is ready; the longer
# answer may continue generating while the comment itself is already being read.
WORKER_STREAM_COMMENT_LEAD_MIN_READY_SEC=0.2
# Reply startup prefill: begin the first reply block as soon as one encoded clip
# is ready.
LIVE_AUDIO_STREAM_REPLY_START_MIN_CLIPS=1
# Micro-chunk schedule in samples at WORKER_AUDIO_SAMPLE_RATE=16000.
# Keep this aligned with the model window: 48 frames / 15fps = 3.2s = 51200
# samples. Do not confuse this with WORKER_AUDIO_SAMPLE_RATE, which stays 16000.
WORKER_LIVEAUDIO_MICRO_CHUNK_SCHEDULE_SAMPLES=51200
# In webinar/stream mode, comments are queued immediately and win before the
# next auto-continue turn, but they never interrupt an already active speech turn.
# While the liveaudio chain is already producing idle filler, cap API cooldowns
# so webinars/streams keep talking instead of sitting silent for a long claim
# value such as 120s. Set to 0 to obey the API value without capping.
SMARTBLOG_CONTINUOUS_PROACTIVE_MAX_AFTER_SEC=8
# When a planned-duration limit is reached, stop accepting new turns but let the
# current spoken answer finish before the final wrap-up.
SMARTBLOG_DURATION_CURRENT_REPLY_GRACE_SEC=300
# After the final wrap-up is generated, wait for real playback to finish but do
# not keep Restream alive indefinitely if the live pipeline gets stuck.
SMARTBLOG_DURATION_FINAL_PLAYBACK_DRAIN_TIMEOUT_SEC=180
# Tail fill policy for residual liveaudio padding in the model.
# Render jobs use zeros here; hidden smooth noise can leak into short avatar
# tails and make the final frames drift from the subtitle/audio timeline.
LIVE_AUDIO_STREAM_TAIL_FILL_MODE=zero
LIVE_AUDIO_STREAM_FILL_NOISE_STD=0.0003
LIVE_AUDIO_STREAM_FILL_NOISE_SEED=420
LIVE_AUDIO_STREAM_CLIP_PROMPT_SWITCH=1
# Keep idle latent noise stable across many filler clips; changing it too often
# makes each idle block start from a visibly different pose.
WORKER_STREAM_IDLE_SEED_STRIDE=64
LIVEKIT_REPLY_PREBUFFER_FRAMES=120
LIVEKIT_REPLY_PREBUFFER_LONG_FRAMES=120
LIVEKIT_REPLY_PREBUFFER_VERY_LONG_FRAMES=120
# Reply labels (`reply@...`) use the interactive startup policy in code.
# Test profile: wait for roughly 10 seconds of generated frames before active
# speech publish. At WORKER_FPS=15 this is 120 frames (8.0s). Keep the cap high so the
# player does not start early with a partial buffer.
LIVEKIT_REPLY_PREBUFFER_INTERACTIVE_FRAMES=120
LIVEKIT_REPLY_PREBUFFER_CAP_SEC=120.00
LIVEKIT_REPLY_PREBUFFER_VERY_LONG_CAP_SEC=120.00
LIVEKIT_REPLY_PREBUFFER_INTERACTIVE_CAP_SEC=120.00
# Smoother profile: keep a slightly deeper mid-speech runway so brief model or
# transport variance is absorbed into buffered frames instead of surfacing as
# visible hold/repeat jitter.
LIVEKIT_STEADY_PREBUFFER_FRAMES=8
LIVEKIT_STEADY_PREBUFFER_CAP_SEC=0.30
LIVEKIT_MAX_AUDIO_BUFFER_FRAMES=96
LIVEKIT_SOFT_BREAK_AUDIO_BUFFER_FRAMES=6
# On interruption, do not keep a multi-second stale video tail before switching.
LIVEKIT_SOFT_BREAK_MAX_BUFFERED_FRAMES=12
LIVEKIT_AUDIO_LEAD_CHUNKS=8
# Keep speech A/V locked: never play speech audio over a duplicated held frame.
LIVEKIT_SPEECH_AUDIO_LEAD_MAX_FRAMES=0
LIVEKIT_DISABLE_PACE_RECOVERY=1
LIVEKIT_DISABLE_RAW_READER_RECOVERY=0
LIVEKIT_LIVE_RAW_HEARTBEAT_SEC=1.0
# Do not apply publish-side frame smoothing/holding by default; idle calmness
# should come from prompting and filler policy instead of post-blending.
LIVEKIT_IDLE_MOTION_DAMPING=0
LIVEKIT_IDLE_MOTION_RMS_THRESHOLD=0.004
LIVEKIT_IDLE_MOTION_QUIET_FRAMES=8
LIVEKIT_IDLE_MOTION_REFRESH_EVERY_FRAMES=4
# LiveKit transport tuning.
# Slightly higher H.264 bitrate for portrait close-up quality.
LIVEKIT_VIDEO_MAX_BITRATE_BPS=5000000
# LiveKit API publish contract accepts 24/30 CFR. Use 30 so 15fps generation
# duplicates evenly.
# generation stays on locked WORKER_FPS; publisher duplicates frames to this clock.
LIVEKIT_PUBLISH_FPS=30
LIVEKIT_VIDEO_MAX_FRAMERATE=30
# Use LiveKit's native AV synchronizer instead of manually capturing audio and
# video sequentially in one task. VideoSource has no internal queue; AVSync adds
# a small video queue and paces capture independently from AudioSource backpressure.
LIVEKIT_USE_AV_SYNCHRONIZER=1
LIVEKIT_AVSYNC_VIDEO_QUEUE_MS=300
# Very mild frontend-side unsharp to recover a bit of perceived detail
# without touching model decode or adding a separate face-restoration stage.
LIVEKIT_MILD_SHARPEN=0
LIVEKIT_MILD_SHARPEN_AMOUNT=0.18
LIVEKIT_MILD_SHARPEN_SIGMA=0.60
# Render VAE/PostVAE/H264 work is owned by the local all-in-one edge profile.
# Keep PostVAE/enhancer knobs in config/worker_profile.render_edge.conf and
# config/worker_profile.render_overrides.conf.
# Playback-side liveaudio transport: keep model ingest on wav/meta for now,
# but let the player read PCM chunks from shared memory instead of disk.
WORKER_LIVEAUDIO_PLAYBACK_SHM=1
WORKER_LIVEAUDIO_PLAYBACK_SHM_CAPACITY_SEC=180
WORKER_LIVEAUDIO_PLAYBACK_SHM_CHUNK_CAPACITY=4096
# Reply producer headroom in liveaudio chunks. With the locked 15fps/48-frame
# mode one chunk is 3.2s. Keep enough runway for webinar streams so transient
# TTS/model jitter does not drain the remote edge.
WORKER_LIVEAUDIO_REPLY_LEAD_CHUNKS=24
# Max audio bitrate for LiveKit audio track.
LIVEKIT_AUDIO_MAX_BITRATE_BPS=96000
# Target audio queue depth (ms) for track push.
# Keep a transport-side runway, but speech output itself stays locked to real
# video frames via LIVEKIT_SPEECH_AUDIO_LEAD_MAX_FRAMES=0.
LIVEKIT_AUDIO_QUEUE_MS=5000
