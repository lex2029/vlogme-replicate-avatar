# Local edge receiver overrides for the 1x B200 Hunyuan-render all-in-one pod.
#
# This file is copied to config/worker_profile.edge.local.conf on the pod.
# The producer/modeld, Hunyuan service, and edge process all use physical GPU 0.

CUDA_VISIBLE_DEVICES=0

REMOTE_EDGE_HOST=127.0.0.1
REMOTE_EDGE_PORT=8788
REMOTE_EDGE_LATENT_VAE_CHECKPOINT=/root/smartblog-assets/ckpt/Wan2.2-S2V-14B/Wan2.1_VAE.pth
REMOTE_EDGE_PREWARM_RENDER_SIZES=704*384,384*704
REMOTE_EDGE_POST_VAE_ENHANCER=1
REMOTE_EDGE_PREWARM_POST_VAE=1
LIVE_RAW_POST_VAE_ENHANCER=1
LIVE_RAW_POST_VAE_ENHANCER_MODELS_DIR=/root/smartblog-assets/worker_assets/enchenh2d/models

# Required edge runtime contract. The receiver validates these at session start
# for both file and live paths, even when the render worker only uses file
# output. Keep them explicit here so profile pruning cannot leave edge half
# configured.
REMOTE_EDGE_LATENT_QUEUE_MAX_BLOCKS=256
REMOTE_EDGE_POST_VAE_QUEUE_MAX_BLOCKS=3
REMOTE_EDGE_ASYNC_POST_VAE=0
REMOTE_EDGE_POST_VAE_FAIL_OPEN=1
REMOTE_EDGE_LATENT_DECODE_FAIL_OPEN=1
REMOTE_EDGE_RTMP_PAIR_QUEUE=256
REMOTE_EDGE_RTMP_DROP_KEEP_TICKS=16
REMOTE_EDGE_RTMP_VIDEO_AHEAD_TICKS=4
REMOTE_EDGE_RTMP_AUDIO_AHEAD_TICKS=2
REMOTE_EDGE_RTMP_WRITE_BUDGET_SEC=0.060
REMOTE_EDGE_RTMP_AUDIO_WAIT_SEC=0.05
REMOTE_EDGE_RTMP_RESYNC_QUEUE_SEC=0
REMOTE_EDGE_RTMP_RESYNC_KEEP_SEC=0.5
REMOTE_EDGE_RTMP_BACKPRESSURE_FAIL_SEC=30
REMOTE_EDGE_RTMP_CANDIDATE_PREFLIGHT_SEC=0
REMOTE_EDGE_RTMP_CANDIDATE_PREFLIGHT_TIMEOUT_SEC=8
REMOTE_EDGE_RTMP_PREFLIGHT_FRAMES=4
REMOTE_EDGE_RTMP_PREFLIGHT_TIMEOUT_SEC=12
REMOTE_EDGE_RTMP_GAP_FILL_FAIL_SEC=30
REMOTE_EDGE_START_PREBUFFER_FRAMES=300
REMOTE_EDGE_AUDIO_FRAME_MS=20
REMOTE_EDGE_MAX_BUFFER_SEC=0
REMOTE_EDGE_ADAPTIVE_BACKGROUND_QUEUE_MIN_BLOCKS=1
REMOTE_EDGE_ADAPTIVE_BACKGROUND_RECOVER_QUEUE_BLOCKS=2
REMOTE_EDGE_ADAPTIVE_BACKGROUND_SHED_AFTER_SEC=20.0
REMOTE_EDGE_STATS_INTERVAL_SEC=10
REMOTE_EDGE_API_PROGRESS_SEC=2.0
REMOTE_EDGE_VIDEO_MAX_BITRATE_BPS=5000000
REMOTE_EDGE_AUDIO_QUEUE_MS=1200
REMOTE_EDGE_AUDIO_MAX_BITRATE_BPS=128000
REMOTE_EDGE_AVSYNC_QUEUE_MS=1200

# File realtime-quality mode: restore the face on native 16fps frames, then RIFE
# to 32fps, then do the final resize. Background restore is clamped off because
# the current RealESRGAN path is too slow and does not give enough visible gain.
REMOTE_EDGE_PREWARM_FACE_RESTORE=1.0
REMOTE_EDGE_PREWARM_BACKGROUND_RESTORE=0.0
REMOTE_EDGE_FACE_RESTORE_MAX=1.0
REMOTE_EDGE_BACKGROUND_RESTORE_MAX=0.0
REMOTE_EDGE_LIVE_BACKGROUND_RESTORE_MAX=0.0
REMOTE_EDGE_FILE_BACKGROUND_RESTORE_MAX=0.0

REMOTE_EDGE_FILE_OUTPUT_FPS=32
REMOTE_EDGE_FILE_MOTION_DAMPING=0.0
REMOTE_EDGE_FILE_PRE_RESIZE=1
LIVE_CHANNEL_RTMP_OUTPUT_FPS=30
REMOTE_EDGE_CLIP_OUTPUT_FPS=16
LIVE_CHANNEL_RTMP_STANDARD_PAD=0
REMOTE_EDGE_FILE_KEEP_LOCAL=0

REMOTE_EDGE_FILE_INTERPOLATION=torch-rife
REMOTE_EDGE_FILE_STREAM_ENCODE=1
# 0 = PostVAE(face/background) on native file frames before RIFE.
# 1 = RIFE first, then PostVAE on every output frame.
REMOTE_EDGE_FILE_POST_VAE_AFTER_RIFE=0
REMOTE_EDGE_LIVE_INTERPOLATION=
REMOTE_EDGE_LIVE_RIFE_TORCH_ENABLED=0
REMOTE_EDGE_LIVE_RIFE_PRE_RESIZE=1
REMOTE_EDGE_LIVE_RIFE_REQUIRE_TENSOR=1
REMOTE_EDGE_PREWARM_LIVE_RIFE=0
REMOTE_EDGE_LIVE_RIFE_BATCH_SOURCE_FRAMES=32
REMOTE_EDGE_LIVE_RIFE_PAIRWISE=0
REMOTE_EDGE_TORCH_RIFE_MODEL_DIR=/opt/RIFE-safetensors
REMOTE_EDGE_TORCH_RIFE_WEIGHTS=/opt/RIFE-safetensors/flownet.safetensors
REMOTE_EDGE_TORCH_RIFE_DEVICE=cuda:0
REMOTE_EDGE_TORCH_RIFE_DTYPE=float16
REMOTE_EDGE_TORCH_RIFE_BATCH_PAIRS=4
REMOTE_EDGE_TORCH_RIFE_PREWARM_SIZE=384x704
REMOTE_EDGE_FILE_UNSHARP=3:3:0.30:3:3:0.0
REMOTE_EDGE_FILE_POST_VAE_BATCH_FRAMES=32
REMOTE_EDGE_FILE_POST_VAE_ENCODE_WAIT_SEC=300

# Keep the edge capable of live subtitle burn-in; the producer controls each
# live session with SMARTBLOG_LIVE_BURN_IN_SUBTITLES / task-level overrides.
REMOTE_EDGE_BURN_IN_SUBTITLES=1
REMOTE_EDGE_SUBTITLE_SAFE_ZONE_PRESET=universal_social
REMOTE_EDGE_SUBTITLE_REVEAL_MODE=karaoke
REMOTE_EDGE_SUBTITLE_REVEAL_BACKEND=snapshot
REMOTE_EDGE_SUBTITLE_MAX_LINES=2
REMOTE_EDGE_SUBTITLE_MAX_WORDS=6
REMOTE_EDGE_SUBTITLE_OVERLAY_CACHE_SIZE=192
REMOTE_EDGE_SUBTITLE_SECONDARY_ALPHA=180
REMOTE_EDGE_SUBTITLE_FONT=/usr/share/fonts/truetype/noto/NotoSans-Bold.ttf
# Keep exact character reveal from ElevenLabs/forced-alignment timings, but use
# the render-compatible visible window so live cards do not disappear or skip
# between subtitle blocks during short pauses.
REMOTE_EDGE_SUBTITLE_EXACT_TIMELINE=0
REMOTE_EDGE_SUBTITLE_MIN_VISIBLE_SEC=1.05
REMOTE_EDGE_SUBTITLE_LIVE_LEAD_SEC=0.00
REMOTE_EDGE_SUBTITLE_AUDIO_FRAME_ANCHOR=0.00
REMOTE_EDGE_SUBTITLE_FINAL_HOLD_MAX_SEC=0.16
REMOTE_EDGE_SUBTITLE_INTER_BLOCK_HOLD_MAX_SEC=0.20

LIVE_RAW_POST_VAE_ENHANCER_TRT=0
LIVE_RAW_POST_VAE_UPSCALE_X2=1
LIVE_RAW_POST_VAE_PHASE_TIMING=1
POST_VAE_TIMING_LOG=1
REMOTE_EDGE_VAE_PHASE_TIMING=1

LIVE_RAW_POST_VAE_FACE_ALIGNED_LAYOUT_MODE=frame_loop
LIVE_RAW_POST_VAE_FACE_LAYOUT_REFRESH_CLIPS=12
LIVE_RAW_POST_VAE_FACE_LAYOUT_CHANGE_THRESHOLD=0.075
LIVE_RAW_POST_VAE_FACE_LAYOUT_EMA=0.85
LIVE_RAW_POST_VAE_FACE_RESTORE_AMP=0
LIVE_RAW_POST_VAE_FACE_RESTORE_CUDNN=0
LIVE_RAW_POST_VAE_FACE_RESTORE_BATCH_SIZE=1
LIVE_RAW_POST_VAE_FACE_RESTORE_EMPTY_CACHE=0
LIVE_RAW_POST_VAE_FACE_RESTORE_SMALL_CROP_ENABLED=1
LIVE_RAW_POST_VAE_FACE_RESTORE_SMALL_CROP_MAX_STRENGTH=1.0
LIVE_RAW_POST_VAE_FACE_RESTORE_SMALL_CROP_SIZE=512
SMARTBLOG_MEDIA_TRT_MAX_DIM=384
