# ------------------------------------------------------------------------------
# Locked runtime contract.
# Change only when the product-level generation contract changes.
#
# Do not add parameters here proactively. A new locked key may be added only
# after an explicit instruction that names the exact parameter and its value.
# ------------------------------------------------------------------------------

# Video/generation clock.
# Single source of truth for model sample_fps, LiveKit publish fps and worker
# frame pacing.
WORKER_FPS=15
# Base inference window in frames. At 15fps this is a 3.2s generation window.
INFER_FRAMES=48
# Fixed denoise quality baseline for live avatar generation.
WORKER_SAMPLE_STEPS=4

# Audio clock.
# Keep the whole realtime path on mono PCM 16k unless the API/player contract
# changes at the same time.
WORKER_AUDIO_SAMPLE_RATE=16000
WORKER_ELEVEN_WS_OUTPUT_FORMAT=pcm_16000

# Model generation shape.
# Default SmartBlog live profiles are `384*256` portrait and `256*384`
# landscape. A high-res live deployment can opt into `720*400` / `400*720`
# through SMARTBLOG_LIVE_PROFILE=highres_1_5x plus a matching SIZE override.
SIZE=384*256
LIVEKIT_VIDEO_WIDTH=256
LIVEKIT_VIDEO_HEIGHT=384

# Deterministic model call contract.
GUIDE_SCALE=4
BASE_SEED=420
SAMPLE_SOLVER=euler
