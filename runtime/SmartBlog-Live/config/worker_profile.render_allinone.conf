# ------------------------------------------------------------------------------
# Shared render-worker base profile.
#
# Hardware-specific behavior must be selected through
# config/worker_profile.render_overrides.conf. The B200 avatar commander must
# not start, warm, download, or fallback to local Hunyuan/MMAudio; those live on
# RTX media workers only.
# ------------------------------------------------------------------------------

WORKER_PROFILE_NAME=render-base
WORKER_BOOT_LOG=1

CUDA_VISIBLE_DEVICES=0
PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
TORCHRUN_NPROC=1
NUM_GPUS_DIT=1
ENABLE_VAE_PARALLEL=0
ULYSSES_SIZE=1
MASTER_PORT=29541
WORKER_FORCE_LIVE_STREAM_PIPELINE=1

# B200 avatar cadence: keep Wan2.2-S2V at 16fps and use the stable highres_1_5x
# avatar request. Timeline media generation is delegated to RTX media workers.
WORKER_FPS=16
SIZE=720*400
SMARTBLOG_LIVE_PROFILE=highres_1_5x
SMARTBLOG_LIVE_HIGH_RES=1
LIVEKIT_VIDEO_WIDTH=720
LIVEKIT_VIDEO_HEIGHT=1280
INFER_FRAMES=64
# Keep the stable 16 fps / 64-frame cadence, but leave the internal WAN block
# at 8 latent frames. On a single B200 this lower canvas leaves room for the
# avatar/edge path and avoids B300-sized warmup allocations.
SMARTBLOG_WAN_NUM_FRAMES_PER_BLOCK=8
WORKER_SAMPLE_STEPS=8
# 64000 samples at 16kHz = 4.0s = 64 frames at 16fps.
WORKER_LIVEAUDIO_MICRO_CHUNK_SCHEDULE_SAMPLES=64000
# Keep render one-pass model chunks at the safe 64-frame inference length.
# Longer audio is split before the model so words are preserved without
# allocating a 128-frame KV profile on single-GPU B200/B300 render pods.
LIVE_AUDIO_STREAM_ALLOW_LONG_CLIPS=1
LIVE_AUDIO_STREAM_MAX_CLIP_FRAMES=64
SMARTBLOG_RENDER_ONEPASS_MAX_CONDITIONING_FRAMES=64
SMARTBLOG_RENDER_ONEPASS_MAX_AUDIO_CLIP_FRAMES=64
SAMPLE_SHIFT=3.0
DROP_MOTION_NOISY=0
SMARTBLOG_LIVE_BURN_IN_SUBTITLES=0
WORKER_ELEVEN_HTTP_TIMESTAMPS=1
WORKER_ELEVEN_HTTP_TIMESTAMPS_FALLBACK_STREAM=1
WORKER_ELEVEN_FORCED_ALIGNMENT_SUBTITLES=1
WORKER_ELEVEN_V3_FIRST_SEGMENT_MIN_WORDS=30
WORKER_ELEVEN_V3_SEGMENT_MIN_WORDS=30
WORKER_ELEVEN_V3_FIRST_SEGMENT_MAX_CHARS=900
WORKER_ELEVEN_V3_SEGMENT_MAX_CHARS=900
WORKER_ELEVEN_V3_SEGMENT_TAIL_SILENCE_MS=0
WORKER_ELEVEN_V3_FINAL_TAIL_SILENCE_MS=900
# Never inject synthetic gap/filler chunks into active live speech. If audio is
# not ready, surface the scheduling problem instead of animating fake silence.
WORKER_STREAM_ALLOW_SYNTHETIC_FILLER=0
LIVE_CHANNEL_RTMP_OUTPUT_FPS=30
LIVEKIT_PUBLISH_FPS=30
LIVEKIT_VIDEO_MAX_FRAMERATE=30

# Blackwell test: keep the upstream acceleration intent, but do not force the
# H100-only copied FlashAttention package. Let the Wan attention code choose
# cuDNN SDPA when FA3 is unavailable on the pod.
#
# Full graph compile repeatedly tries to capture dynamic live KV-cache writes
# (`kv_cache["cond_k"]`, rope application) and turns first warmup into minutes of
# graph breaks. Keep compile enabled, but restrict it to the stable head region.
ENABLE_COMPILE=true
USE_FP8=1
TORCH_COMPILE_SAFE_FALLBACK=1
TORCH_COMPILE_INCLUDE_FUNCS=CausalHead_S2V.forward
TORCH_COMPILE_SKIP_FUNCS=_forward_inference,rope_apply,rope_apply_cond,CausalWanS2VAttention.forward,CausalWanS2VAttentionBlock._cross_attn_ffn
TORCHINDUCTOR_MAX_AUTOTUNE=0
TORCHINDUCTOR_MAX_AUTOTUNE_GEMM=0
TORCHINDUCTOR_MAX_AUTOTUNE_POINTWISE=0
TORCHINDUCTOR_TRITON_AUTOTUNE_AT_COMPILE_TIME=0
TORCHINDUCTOR_COMPILE_THREADS=16
LIVEAVATAR_DISABLE_FLASH_ATTN=false
LIVEAVATAR_DISABLE_CUDNN_ATTN=false
NCCL_P2P_PREWARM=1
SMARTBLOG_SINGLE_GPU_DIST_BACKEND=gloo

# Use local assets on Runpod root/container disk. /workspace is a network mount
# and caused multi-minute cold loads on H100.
WORKER_ASSET_ROOT=/root/smartblog-assets
HF_HOME="${WORKER_ASSET_ROOT}/hf"
LIVE_RAW_POST_VAE_ENHANCER_MODELS_DIR=/root/smartblog-assets/worker_assets/enchenh2d/models
CKPT_DIR="${WORKER_ASSET_ROOT}/ckpt/Wan2.2-S2V-14B/"
LORA_PATH_DMD="${WORKER_ASSET_ROOT}/ckpt/LiveAvatar/liveavatar.safetensors"
MERGED_NOISE_MODEL_DIR="${WORKER_ASSET_ROOT}/ckpt/Wan2.2-S2V-14B-merged-liveavatar-prefp8-test"
USE_MERGED_CKPT=1

# All-in-one render path: producer talks to a local edge receiver on this pod.
REMOTE_EDGE_ENABLED=1
REMOTE_EDGE_HOST=127.0.0.1
REMOTE_EDGE_PORT=8788
REMOTE_EDGE_SHARED_SECRET="${REMOTE_EDGE_SHARED_SECRET:-}"
REMOTE_EDGE_STREAM_MODE=latents
REMOTE_EDGE_LATENT_CODEC=raw
REMOTE_EDGE_LATENT_ZLIB=0
REMOTE_EDGE_SKIP_LOCAL_DECODE=1
REMOTE_EDGE_FAIL_FATAL=1
REMOTE_EDGE_CONNECT_TIMEOUT_SEC=60.0
REMOTE_EDGE_WRITE_TIMEOUT_SEC=60.0
REMOTE_EDGE_ASYNC_SENDER=1
REMOTE_EDGE_ASYNC_QUEUE_MAX_BLOCKS=256
REMOTE_EDGE_ASYNC_CLOSE_DRAIN_SEC=30
REMOTE_EDGE_ASYNC_PINNED_COPY=1
REMOTE_EDGE_FILE_OUTPUT_FPS=16
REMOTE_EDGE_FILE_MOTION_DAMPING=0.0
# Final MP4 postprocess is delegated to the external media finalizer. This pod
# emits the native 16fps timeline; the RTX media server applies VFX/RIFE/resize/NVENC and
# uploads directly to the job's signed output URL.
# REMOTE_EDGE_FILE_UPSCALE_SERVICE_URL=https://<runpod-id>-8888.proxy.runpod.net/upscale
# REMOTE_EDGE_FILE_UPSCALE_SHARED_SECRET=<set in .env>
REMOTE_EDGE_FILE_REMOTE_FINALIZER=1
REMOTE_EDGE_FILE_UPSCALE_DIRECT_UPLOAD=1
REMOTE_EDGE_FILE_UPSCALE_ENABLED=1
REMOTE_EDGE_FILE_UPSCALE_RIFE=1
REMOTE_EDGE_FILE_UPSCALE_RIFE_STAGE=pre_vfx
REMOTE_EDGE_FILE_UPSCALE_TARGET_FPS=30
SMARTBLOG_RENDER_EDGE_FINALIZER_BACKGROUND=1
REMOTE_EDGE_FILE_PRE_RESIZE=0
REMOTE_EDGE_FILE_INTERPOLATION=

# Render pods own every render_video variant: avatar-only, Hunyuan-only, and
# mixed avatar+Hunyuan timelines. Live sessions stay on the 3xB200 live pod.
# Use SMARTBLOG_DELAYED_CLAIM_JOB_TYPES=render_video plus
# SMARTBLOG_DELAYED_CLAIM_SEC on a secondary pod when it should back up the
# primary renderer after a standby delay.
SMARTBLOG_JOB_TYPES=render_video
SMARTBLOG_RENDER_ROUTE=all
SMARTBLOG_RENDER_AVATAR_BACKUP_DELAY_SEC=0
SMARTBLOG_DELAYED_CLAIM_JOB_TYPES=
SMARTBLOG_DELAYED_CLAIM_SEC=0
SMARTBLOG_RENDER_VIDEO_HIGH_RES=1
SMARTBLOG_RENDER_VIDEO_PROFILE=highres_1_5x
SMARTBLOG_AVATAR_REF_NO_CROP=1
SMARTBLOG_RENDER_FORCE_SAMPLE_STEPS=8
SMARTBLOG_MODELD_CLEAR_CUDA_AFTER_INFER=1
SMARTBLOG_RENDER_VIDEO_OUTPUT_FPS=16
SMARTBLOG_RENDER_STREAM_FILE=0
SMARTBLOG_RENDER_STREAM_INTERPOLATION=
# Batched TPP CFG was tested for render/test-video prompt adherence, but it
# produced visible artifacts without enough benefit. Keep render/test-video
# on the same single-pass path as live unless we explicitly re-test CFG.
SMARTBLOG_RENDER_TPP_CFG_MODE=off
SMARTBLOG_RENDER_BURN_IN_SUBTITLES=1
SMARTBLOG_RENDER_SUBTITLE_STAGE=segment
SMARTBLOG_RENDER_SEGMENT_POSTPROCESS_BACKGROUND=0
# Timeline video inserts use media workers. The worker still routes these
# through legacy ltx-named code paths because the public render contract uses
# ltx{} for insert config, but the actual media model is Hunyuan, not LTX.
SMARTBLOG_LTX_RENDER_ENABLED=1
SMARTBLOG_LTX_SERVICE_URL=
SMARTBLOG_LTX_SERVICE_READY_TIMEOUT_SEC=1200
SMARTBLOG_LTX_SIZE_PROFILE=hunyuan-832
SMARTBLOG_HUNYUAN_SIZE_PROFILE=hunyuan-832
SMARTBLOG_LTX_SERVICE_WARMUP=0
SMARTBLOG_LTX_SERVICE_WARMUP_WIDTH=480
SMARTBLOG_LTX_SERVICE_WARMUP_HEIGHT=832
SMARTBLOG_LTX_SERVICE_WARMUP_FRAMES=17
SMARTBLOG_LTX_SERVICE_WARMUP_FPS=16
SMARTBLOG_LTX_FRAME_RATE=16
SMARTBLOG_LTX_OUTPUT_FPS=16
SMARTBLOG_HUNYUAN_FRAME_RATE=16
SMARTBLOG_HUNYUAN_FORCE_FRAME_RATE=16
SMARTBLOG_HUNYUAN_OUTPUT_FPS=16
SMARTBLOG_HUNYUAN_NUM_INFERENCE_STEPS=8
SMARTBLOG_LTX_PROGRESS_EXPECTED_SEC=60
SMARTBLOG_HUNYUAN_PROGRESS_EXPECTED_SEC=60
SMARTBLOG_HUNYUAN_PROGRESS_SEC_PER_FRAME_STEP=0.12
SMARTBLOG_HUNYUAN_PROGRESS_SEC_PER_VIDEO_SEC=18
SMARTBLOG_HUNYUAN_PROGRESS_TAIL_STEP_SEC=45
# Hunyuan is generated outside the avatar edge VAE/PostVAE/RIFE path, so apply a
# small deterministic color/detail match before concatenating it with avatar
# segments. Do not enable RIFE here; face restore is handled by the shared media
# postprocess path after the Hunyuan clip is generated.
SMARTBLOG_LTX_VISUAL_MATCH=1
SMARTBLOG_LTX_VISUAL_MATCH_EQ=eq=contrast=1.055:saturation=1.18:gamma=0.985
SMARTBLOG_LTX_VISUAL_MATCH_UNSHARP=3:3:0.30:3:3:0.0
SMARTBLOG_HUNYUAN_SERVICE_ENABLED=0
SMARTBLOG_HUNYUAN_SERVICE_ON_DEMAND=0
SMARTBLOG_HUNYUAN_PYTHON=
SMARTBLOG_HUNYUAN_SERVICE_HOST=
SMARTBLOG_HUNYUAN_SERVICE_PORT=
SMARTBLOG_HUNYUAN_SERVICE_URL=
SMARTBLOG_HUNYUAN_MODEL_ID=
SMARTBLOG_HUNYUAN_CUDA_VISIBLE_DEVICES=
SMARTBLOG_HUNYUAN_HF_HOME=
SMARTBLOG_HUNYUAN_SERVICE_READY_TIMEOUT_SEC=1800
SMARTBLOG_HUNYUAN_SERVICE_WARMUP=0
SMARTBLOG_HUNYUAN_SERVICE_WARMUP_WIDTH=480
SMARTBLOG_HUNYUAN_SERVICE_WARMUP_HEIGHT=832
SMARTBLOG_HUNYUAN_SERVICE_WARMUP_FRAMES=17
SMARTBLOG_HUNYUAN_SERVICE_WARMUP_FPS=16
SMARTBLOG_HUNYUAN_SERVICE_WARMUP_STEPS=4
SMARTBLOG_HUNYUAN_SWAP_MODELD=0
# B200 file/live mode keeps only face restore before RIFE. The edge process also
# clamps background restore to zero, so task/persona background values cannot
# accidentally trigger the slow RealESRGAN path.
SMARTBLOG_RENDER_BACKGROUND_RESTORE_ENABLED=0
SMARTBLOG_RENDER_SUBTITLE_SAFE_ZONE_PRESET=universal_social
SMARTBLOG_RENDER_SUBTITLE_REVEAL_MODE=karaoke
SMARTBLOG_RENDER_SUBTITLE_MAX_LINES=2
SMARTBLOG_RENDER_SUBTITLE_MIN_WORDS=3
SMARTBLOG_RENDER_SUBTITLE_MAX_WORDS=6
SMARTBLOG_RENDER_SUBTITLE_MAX_DURATION_SEC=2.5
SMARTBLOG_RENDER_SUBTITLE_ORPHAN_WORDS=2
SMARTBLOG_RENDER_SUBTITLE_SECONDARY_ALPHA=180
SMARTBLOG_RENDER_SUBTITLE_FONT="Noto Sans"
SMARTBLOG_RENDER_SUBTITLE_FONT_FILE=/usr/share/fonts/truetype/noto/NotoSans-Bold.ttf
# Keep worker-side TTS/render memory bounded. Long videos must be many
# continuous same-frame segments, not one huge LiveAvatar num_clip request.
SMARTBLOG_RENDER_TTS_TARGET_WORDS=45
SMARTBLOG_RENDER_TTS_VISUAL_MERGE_MAX_SEC=18
SMARTBLOG_RENDER_AUDIO_SEGMENT_MAX_SEC=18
SMARTBLOG_RENDER_AVATAR_AUDIO_PREPROCESS=1
SMARTBLOG_RENDER_AVATAR_AUDIO_PRESET=auto
SMARTBLOG_RENDER_AVATAR_AUDIO_AUTO_ANALYSIS_SEC=60
SMARTBLOG_RENDER_AVATAR_AUDIO_AUTO_SONG_THRESHOLD=2.25
SMARTBLOG_RENDER_AVATAR_AUDIO_VOICE_SHAPE=auto
SMARTBLOG_RENDER_AVATAR_AUDIO_LETTER_DYNAMICS=1
SMARTBLOG_RENDER_AVATAR_AUDIO_LETTER_CLOSURE=1
SMARTBLOG_RENDER_AVATAR_AUDIO_LETTER_CLOSURE_MS=18
SMARTBLOG_RENDER_AVATAR_AUDIO_LETTER_CLOSURE_GAIN=0.80
SMARTBLOG_RENDER_AVATAR_AUDIO_LETTER_PRE_MS=6
SMARTBLOG_RENDER_AVATAR_AUDIO_LETTER_CONSONANT_POST_MS=34
SMARTBLOG_RENDER_AVATAR_AUDIO_LETTER_CONSONANT_GAIN=1.18
SMARTBLOG_RENDER_AVATAR_AUDIO_LETTER_LABIAL_GAIN=1.28
SMARTBLOG_RENDER_AVATAR_AUDIO_LETTER_CENTER_EDGE_GAIN=0.92
SMARTBLOG_RENDER_AVATAR_AUDIO_LETTER_CENTER_CONSONANT_GAIN=1.06
SMARTBLOG_RENDER_AVATAR_AUDIO_LETTER_CENTER_VOWEL_GAIN=1.00
SMARTBLOG_RENDER_AVATAR_AUDIO_TRANSIENT_BOOST=1
SMARTBLOG_RENDER_AVATAR_AUDIO_TRANSIENT_GAIN=1.06
SMARTBLOG_RENDER_AVATAR_AUDIO_TRANSIENT_THRESHOLD_DB=3.2
SMARTBLOG_RENDER_AVATAR_AUDIO_START_BOOST=1
SMARTBLOG_RENDER_AVATAR_AUDIO_START_BOOST_GAIN=1.26
SMARTBLOG_RENDER_AVATAR_AUDIO_START_BOOST_SEC=0.55
SMARTBLOG_RENDER_AVATAR_AUDIO_START_TARGET_PEAK=0.80
SMARTBLOG_RENDER_AVATAR_AUDIO_START_VOWEL_BOOST=1
SMARTBLOG_RENDER_AVATAR_AUDIO_START_VOWEL_GAIN=1.14
SMARTBLOG_RENDER_AVATAR_AUDIO_START_VOWEL_WINDOW_SEC=0.80
SMARTBLOG_RENDER_AVATAR_AUDIO_MALE_PITCH=1.095
SMARTBLOG_RENDER_AVATAR_AUDIO_MALE_VOWEL_DB=3.0
SMARTBLOG_RENDER_AVATAR_AUDIO_MALE_PRESENCE_DB=6.4
SMARTBLOG_RENDER_AVATAR_AUDIO_MALE_UPPER_DB=4.6
SMARTBLOG_RENDER_AVATAR_AUDIO_MALE_LETTER_CLOSURE_MS=20
SMARTBLOG_RENDER_AVATAR_AUDIO_MALE_LETTER_CLOSURE_GAIN=0.68
SMARTBLOG_RENDER_AVATAR_AUDIO_MALE_LETTER_CONSONANT_POST_MS=40
SMARTBLOG_RENDER_AVATAR_AUDIO_MALE_LETTER_CONSONANT_GAIN=1.36
SMARTBLOG_RENDER_AVATAR_AUDIO_MALE_LETTER_LABIAL_GAIN=1.54
SMARTBLOG_RENDER_AVATAR_AUDIO_MALE_LETTER_VOWEL_GAIN=1.14
SMARTBLOG_RENDER_AVATAR_AUDIO_MALE_LETTER_CENTER_EDGE_GAIN=0.84
SMARTBLOG_RENDER_AVATAR_AUDIO_MALE_LETTER_CENTER_CONSONANT_GAIN=1.20
SMARTBLOG_RENDER_AVATAR_AUDIO_MALE_LETTER_CENTER_VOWEL_GAIN=1.10
SMARTBLOG_RENDER_AVATAR_AUDIO_MALE_TRANSIENT_GAIN=1.24
SMARTBLOG_RENDER_AVATAR_AUDIO_MALE_TRANSIENT_THRESHOLD_DB=2.4
SMARTBLOG_RENDER_AVATAR_AUDIO_MALE_START_BOOST_GAIN=1.36
SMARTBLOG_RENDER_AVATAR_AUDIO_MALE_START_TARGET_PEAK=0.84
SMARTBLOG_RENDER_AVATAR_AUDIO_MALE_START_VOWEL_GAIN=1.24
SMARTBLOG_RENDER_AVATAR_AUDIO_MALE_START_VOWEL_WINDOW_SEC=0.95
SMARTBLOG_RENDER_AVATAR_AUDIO_ADVANCE_MS=60
# Keep the anti-frozen-frame negative prompt behavior so the model is not pushed
# into a lifeless still image, while discouraging high-energy/camera artifacts.
SMARTBLOG_RENDER_SANITIZE_STATIC_NEGATIVE=0
SMARTBLOG_RENDER_DEFAULT_NEGATIVE_PROMPT="blurry, distorted face, bad anatomy, bad hands, extra fingers, text, subtitles, watermark, logo, jpeg artifacts, flicker, frozen frame, lifeless static image, motionless still image, harsh camera movement, fast body movement, dancing, swaying, jumping, exaggerated gestures, large head movement, rapid blinking, excessive blinking, darting eyes, eye twitch, nervous facial twitching, zoom, pan, tilt, motion blur"

# Local media_process is intentionally not used on this profile. The local edge
# receiver owns render-video VAE/PostVAE/RIFE/upload, just like production.
SMARTBLOG_MEDIA_PROCESS_DEVICE=cuda:0
WORKER_STARTUP_REPLY_WARMUP_ENABLED=0
WORKER_STARTUP_LIVEAUDIO_WARMUP_ENABLED=0
WORKER_STARTUP_LIVEAUDIO_WARMUP_PASSES=0
LIVE_AUDIO_STREAM_REPLY_MODEL_QUEUE_TARGET=1
WORKER_STREAM_TURN_BOUNDARY_PAUSE_MAX_SEC=10.0
WORKER_STREAM_TURN_BOUNDARY_PAUSE_MAX_CHUNKS=8
# Match the old April liveaudio behavior on the B200 live test profile: a
# terminal padded speech tail may switch to the persona idle prompt, so strong
# idle actions such as dancing are visible during pauses instead of the speech
# prompt holding a static talking pose.
LIVE_AUDIO_STREAM_SPEECH_TAIL_IDLE_PROMPT=1

# LiveAvatar-native speech clarity for model conditioning only.
# This affects only the audio features fed to LiveAvatar, not the final TTS audio
# in the file/stream. Keep external lipsync and speech masks disabled here.
LIVEAVATAR_AUDIO_SAMPLE_M=0
LIVEAVATAR_MODEL_AUDIO_PROFILE=off
WORKER_LIVEAUDIO_LIPSYNC_SPEECH_MASK=0
WORKER_LIVEAUDIO_FEATURE_SPEECH_BLEND=0
LIVE_AUDIO_STREAM_FEATURE_SPEECH_BLEND=0

WORKER_LOG_LEVEL=INFO
MODEL_LOG_LEVEL=INFO
MODEL_OTHER_RANK_LOG_LEVEL=WARNING
WORKER_TIMING_LOG=1
MODEL_TIMING_LOG=1
LIVE_AUDIO_TPP_TIMING_LOG=1
MEDIA_TIMING_LOG=1
POST_VAE_TIMING_LOG=1
SMARTBLOG_LIVE_TIMELINE_LOG=1
