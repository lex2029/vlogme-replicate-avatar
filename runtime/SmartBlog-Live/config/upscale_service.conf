# Fixed media postprocessing service defaults.
# Secrets must stay outside git in `upscale.secrets.env` or the process env.

SMARTBLOG_UPSCALE_HOST=0.0.0.0
# Vast maps public host ports to the container's exposed 8888/tcp port. Keep the
# service listening on 8888 inside the container; the public port can still be
# different, for example http://<vast-public-ip>:19300.
SMARTBLOG_UPSCALE_PORT=8888
SMARTBLOG_UPSCALE_DEFAULT_QUALITY=DEBLUR_HIGH
SMARTBLOG_UPSCALE_DEFAULT_SCALE=1
# Default off for direct/postprocessing callers. SmartBlog render workers pass
# `upscale=1` explicitly when they need the 720p VSR/deblur quality pass.
SMARTBLOG_UPSCALE_ENABLED=0
SMARTBLOG_UPSCALE_RIFE=1
SMARTBLOG_UPSCALE_RIFE_STAGE=pre_vfx
SMARTBLOG_UPSCALE_TARGET_FPS=30
SMARTBLOG_UPSCALE_GPU=0
SMARTBLOG_UPSCALE_MAX_CONCURRENT=1
SMARTBLOG_UPSCALE_ASYNC_PROGRESS_TIMEOUT_SEC=300
SMARTBLOG_UPSCALE_ASYNC_PROCESS_TIMEOUT_SEC=1800
SMARTBLOG_UPSCALE_ASYNC_EXIT_ON_STALL=1
SMARTBLOG_UPSCALE_ASYNC_EXIT_ON_CANCEL=1
SMARTBLOG_UPSCALE_PREFETCH_RIFE=1
SMARTBLOG_UPSCALE_RIFE_MODEL_DIR=/opt/RIFE-safetensors
SMARTBLOG_UPSCALE_RIFE_DTYPE=float16
SMARTBLOG_UPSCALE_RIFE_BATCH_PAIRS=4
SMARTBLOG_UPSCALE_VSR_INTEGER_SCALE=1
