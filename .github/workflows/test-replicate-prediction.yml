name: Test Replicate Prediction

on:
  workflow_dispatch:
    inputs:
      model_name:
        description: 'Replicate model name, for example "lex2029/vlogme-avatar"'
        required: true
        default: "lex2029/vlogme-avatar"
      deployment:
        description: 'Optional deployment, for example "lex2029/vlogme-avatar-a100-2x"'
        required: false
        default: "lex2029/vlogme-avatar-a100-2x"
      timeout_sec:
        description: "Maximum time to wait for the prediction"
        required: true
        default: "5400"
      max_processing_sec:
        description: "Optional processing watchdog. 0 disables auto-cancel."
        required: false
        default: "0"
      poll_sec:
        description: "Polling interval in seconds"
        required: false
        default: "30"
      sample_steps:
        description: "Optional denoising steps override. Use 4 for smoke, 6+ for quality."
        required: false
        default: "4"
      render_timeout_sec:
        description: "Optional internal model render watchdog. 0 disables it."
        required: false
        default: "0"
      audio_seconds:
        description: "Generated smoke audio duration in seconds"
        required: false
        default: "2.0"

jobs:
  test_prediction:
    name: Test Replicate Prediction
    runs-on: ubuntu-latest
    timeout-minutes: 100
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run smoke prediction
        env:
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          PYTHONUNBUFFERED: "1"
        run: |
          python3 scripts/test_replicate_prediction.py \
            --model "${{ inputs.model_name }}" \
            --deployment "${{ inputs.deployment }}" \
            --timeout-sec "${{ inputs.timeout_sec }}" \
            --max-processing-sec "${{ inputs.max_processing_sec }}" \
            --poll-sec "${{ inputs.poll_sec }}" \
            --sample-steps "${{ inputs.sample_steps }}" \
            --render-timeout-sec "${{ inputs.render_timeout_sec }}" \
            --audio-seconds "${{ inputs.audio_seconds }}"
