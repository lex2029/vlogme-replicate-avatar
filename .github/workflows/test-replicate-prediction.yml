name: Test Replicate Prediction

on:
  workflow_dispatch:
    inputs:
      model_name:
        description: 'Replicate model name, for example "lex2029/vlogme-avatar"'
        required: true
        default: "lex2029/vlogme-avatar"
      deployment:
        description: 'Optional deployment, for example "lex2029/vlogme-avatar-a100-2x"'
        required: false
        default: "lex2029/vlogme-avatar-a100-2x"
      image:
        description: "Repo-relative avatar image path"
        required: false
        default: "runtime/SmartBlog-Live/assets/ref_user_photo.jpg"
      audio:
        description: "Optional repo-relative WAV path. Empty generates smoke tone audio."
        required: false
        default: ""
      timeout_sec:
        description: "Maximum time to wait for the prediction"
        required: true
        default: "5400"
      max_processing_sec:
        description: "Optional processing watchdog. 0 disables auto-cancel."
        required: false
        default: "0"
      poll_sec:
        description: "Polling interval in seconds"
        required: false
        default: "30"
      sample_steps:
        description: "Optional denoising steps override. Use 4 for smoke, 6+ for quality."
        required: false
        default: "4"
      render_timeout_sec:
        description: "Optional internal model render watchdog. 0 disables it."
        required: false
        default: "0"
      gpu_layout:
        description: "Optional cold-start GPU layout override: dit2, passthrough, split, or single."
        required: false
        default: ""
      use_fp8:
        description: "Optional cold-start FP8 override: -1 default, 0 off, 1 on."
        required: false
        default: "-1"
      enable_compile:
        description: "Optional cold-start compile override: -1 default, 0 off, 1 on."
        required: false
        default: "-1"
      kv_cache_frames:
        description: "Optional cold-start KV history window in output frames. 0 keeps default."
        required: false
        default: "0"
      wan_block_frames:
        description: "Optional cold-start Wan latent frames per denoise block. 0 keeps default."
        required: false
        default: "0"
      infer_frames:
        description: "Optional cold-start generated frames per clip. 0 keeps default."
        required: false
        default: "0"
      motion_file:
        description: "Optional cold-start file-render motion-state override: -1 default, 0 off, 1 on."
        required: false
        default: "-1"
      motion_mode:
        description: "Optional cold-start file-render motion-state mode: latent or decoded."
        required: false
        default: ""
      audio_seconds:
        description: "Generated smoke audio duration in seconds"
        required: false
        default: "2.0"
      face_restore:
        description: "Optional GFPGAN face restore override. -1 keeps deployment default."
        required: false
        default: "-1"
      face_source_x2:
        description: "Optional cold-start GFPGAN source override: -1 default, 0 native crop, 1 bicubic x2 crop."
        required: false
        default: "-1"
      stream_file_interpolation:
        description: "Optional interpolation override: torch-rife, off, or empty for default."
        required: false
        default: ""
      output_fps:
        description: "Optional output FPS override. 0 keeps auto/default."
        required: false
        default: "0"
      stream_file_nvvfx:
        description: "Optional cold-start NVIDIA VSR override: -1 default, 0 off, 1 on."
        required: false
        default: "-1"
      nvvfx_quality:
        description: "Optional cold-start NVIDIA VSR quality."
        required: false
        default: ""

jobs:
  test_prediction:
    name: Test Replicate Prediction
    runs-on: ubuntu-latest
    timeout-minutes: 100
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Replicate prediction
        env:
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          PYTHONUNBUFFERED: "1"
        run: |
          python3 scripts/test_replicate_prediction.py \
            --model "${{ inputs.model_name }}" \
            --deployment "${{ inputs.deployment }}" \
            --image "${{ inputs.image }}" \
            --audio "${{ inputs.audio }}" \
            --timeout-sec "${{ inputs.timeout_sec }}" \
            --max-processing-sec "${{ inputs.max_processing_sec }}" \
            --poll-sec "${{ inputs.poll_sec }}" \
            --sample-steps "${{ inputs.sample_steps }}" \
            --render-timeout-sec "${{ inputs.render_timeout_sec }}" \
            --gpu-layout "${{ inputs.gpu_layout }}" \
            --use-fp8 "${{ inputs.use_fp8 }}" \
            --enable-compile "${{ inputs.enable_compile }}" \
            --kv-cache-frames "${{ inputs.kv_cache_frames }}" \
            --wan-block-frames "${{ inputs.wan_block_frames }}" \
            --infer-frames "${{ inputs.infer_frames }}" \
            --motion-file "${{ inputs.motion_file }}" \
            --motion-mode "${{ inputs.motion_mode }}" \
            --audio-seconds "${{ inputs.audio_seconds }}" \
            --face-restore "${{ inputs.face_restore }}" \
            --face-source-x2 "${{ inputs.face_source_x2 }}" \
            --stream-file-interpolation "${{ inputs.stream_file_interpolation }}" \
            --output-fps "${{ inputs.output_fps }}" \
            --stream-file-nvvfx "${{ inputs.stream_file_nvvfx }}" \
            --nvvfx-quality "${{ inputs.nvvfx_quality }}"
