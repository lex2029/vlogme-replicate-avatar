name: Push to Replicate

on:
  workflow_dispatch:
    inputs:
      model_name:
        description: 'Replicate model name, for example "vlogme/avatar"'
        required: true
      cog_config:
        description: 'Cog config to push: "cog.yaml" for GPU avatar or "cog.bridge.yaml" for VlogMe bridge'
        required: false
        default: "cog.yaml"

jobs:
  push_to_replicate:
    name: Push to Replicate
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          docker-images: false

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Cog
        uses: replicate/setup-cog@v2
        with:
          cog-version: "v0.19.3"
          token: ${{ secrets.REPLICATE_CLI_AUTH_TOKEN }}

      - name: Select Cog config
        env:
          COG_CONFIG: ${{ inputs.cog_config }}
          VLOGME_API_TOKEN: ${{ secrets.VLOGME_API_TOKEN }}
        run: |
          case "$COG_CONFIG" in
            cog.yaml)
              echo "Using default cog.yaml"
              ;;
            cog.bridge.yaml)
              if [ -z "$VLOGME_API_TOKEN" ]; then
                echo "Missing VLOGME_API_TOKEN GitHub Actions secret for bridge build" >&2
                exit 1
              fi
              mkdir -p .replicate_runtime
              printf '%s' "$VLOGME_API_TOKEN" > .replicate_runtime/vlogme_api_token
              chmod 600 .replicate_runtime/vlogme_api_token
              cp cog.bridge.yaml cog.yaml
              echo "Using bridge Cog config"
              ;;
            *)
              echo "Unsupported cog_config: $COG_CONFIG" >&2
              exit 1
              ;;
          esac

      - name: Push to Replicate
        run: cog push r8.im/${{ inputs.model_name }}
